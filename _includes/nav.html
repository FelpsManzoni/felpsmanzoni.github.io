<nav id="primary-nav" class="nav" aria-label="Primary">
  <ul class="nav-list">
    {% for item in site.nav %}
      {% assign href = item.url | relative_url %}
      <li>
        <a
          href="{{ href }}"
          class="nav-link{% if page.url == item.url or page.permalink == item.url %} active{% endif %}"
          {% if item.external %}target="_blank" rel="noopener"{% endif %}
        >{{ item.title }}</a>
      </li>
    {% endfor %}
  </ul>
</nav>
